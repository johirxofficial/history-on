name: History-On Pro Build

on: [push]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Pro Assets
        run: |
          # Advanced UI with Aurora Glass Design & Favicons
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              :root { 
                --bg: #0f172a; 
                --card: rgba(30, 41, 59, 0.6); 
                --text: #f8fafc; 
                --muted: #94a3b8; 
                --accent: #8b5cf6; 
                --danger: #ef4444; 
              }
              body { 
                width: 420px; 
                height: 580px; 
                margin: 0; 
                font-family: 'Inter', system-ui, sans-serif; 
                background: linear-gradient(135deg, #0f172a, #2e1065, #0f172a); 
                background-size: 400% 400%; 
                animation: aurora 12s ease infinite; 
                color: var(--text); 
                overflow: hidden; 
              }
              @keyframes aurora { 
                0% { background-position: 0% 50%; } 
                50% { background-position: 100% 50%; } 
                100% { background-position: 0% 50%; } 
              }
              .container { display: flex; flex-direction: column; height: 100%; backdrop-filter: blur(20px); }
              .header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); }
              .branding { display: flex; align-items: center; gap: 12px; }
              .header img { width: 28px; height: 28px; filter: drop-shadow(0 0 8px var(--accent)); }
              .header h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
              #clear-btn { 
                background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); 
                padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; 
              }
              #clear-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
              .search-wrap { padding: 16px 20px; }
              input { 
                width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
                background: rgba(0,0,0,0.25); color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; 
              }
              input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); background: rgba(0,0,0,0.4); }
              input::placeholder { color: var(--muted); }
              #results { flex-grow: 1; overflow-y: auto; padding: 0 20px 20px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
              #results::-webkit-scrollbar { width: 6px; }
              #results::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
              .item { 
                display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 10px; 
                background: var(--card); margin-bottom: 10px; cursor: pointer; transition: all 0.2s; 
                border: 1px solid rgba(255,255,255,0.03); 
              }
              .item:hover { background: rgba(255,255,255,0.05); border-color: rgba(139, 92, 246, 0.5); transform: translateY(-2px); }
              .favicon { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
              .info { flex-grow: 1; overflow: hidden; }
              .title { font-weight: 500; font-size: 13px; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
              .url { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 3px; display: block; }
              .time { font-size: 10px; color: var(--accent); white-space: nowrap; font-weight: 600; opacity: 0.8; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <div class="branding">
                  <img src="icon.png" alt="Logo">
                  <h1>History-On <span style="color: var(--accent)">Pro</span></h1>
                </div>
                <button id="clear-btn">Clear All</button>
              </div>
              <div class="search-wrap">
                <input type="text" id="search" placeholder="Search your timeline..." autofocus>
              </div>
              <div id="results"></div>
            </div>
            <script src="script.js"></script>
          </body>
          </html>
          EOF

          # Advanced Search Logic with Time Formatting & Favicons
          cat <<EOF > script.js
          const searchInput = document.getElementById('search');
          const resultsDiv = document.getElementById('results');
          const clearBtn = document.getElementById('clear-btn');

          const formatTime = (timestamp) => {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + 
                   date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
          };

          const getFavicon = (url) => {
            try { 
              const hostname = new URL(url).hostname;
              return \`https://www.google.com/s2/favicons?sz=32&domain=\${hostname}\`;
            } catch { 
              return ''; 
            }
          };

          const render = (query = '') => {
            chrome.history.search({ text: query, maxResults: 100, startTime: 0 }, (data) => {
              if (data.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top: 20px; font-size: 13px;">No history found.</div>';
                return;
              }
              resultsDiv.innerHTML = data.map(page => \`
                <div class="item" onclick="window.open('\${page.url}', '_blank')">
                  <img class="favicon" src="\${getFavicon(page.url)}" alt="" onerror="this.style.opacity='0'">
                  <div class="info">
                    <span class="title">\${page.title || 'Unknown Title'}</span>
                    <span class="url">\${page.url}</span>
                  </div>
                  <span class="time">\${formatTime(page.lastVisitTime)}</span>
                </div>
              \`).join('');
            });
          };

          clearBtn.addEventListener('click', () => {
            if(confirm('WARNING: Are you sure you want to completely erase your browsing history? This cannot be undone.')) {
              chrome.history.deleteAll(() => {
                searchInput.value = '';
                render();
              });
            }
          });

          searchInput.addEventListener('input', e => render(e.target.value));
          render();
          EOF

          # Fetch Premium Logo
          curl -L -o icon.png "https://cdn-icons-png.flaticon.com/512/3913/3913442.png"
          
      - name: Package Pro Extension
        run: |
          mkdir -p build_dir
          cp manifest.json index.html script.js icon.png build_dir/
          cd build_dir && zip -r ../History-On-v2-Pro.zip . && cd ..
          
      - name: Sync ZIP to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add History-On-v2-Pro.zip
          git commit -m "🚀 Deploy History-On Pro v2.0 (Aurora Engine & Wipe Function)" || echo "No changes"
          git push
