name: History-On Master Build
on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Premium Assets
        run: |
          # Professional UI with Responsive Slide Design
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              :root { --primary: #3b82f6; --bg: #050505; --card: #121212; --text: #f8fafc; }
              body { width: 380px; height: 550px; margin: 0; font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); overflow: hidden; }
              .container { display: flex; flex-direction: column; height: 100%; border-left: 1px solid #222; background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); }
              .header { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1a1a1a; background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); }
              .header img { width: 32px; height: 32px; }
              .header h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
              .search-wrap { padding: 15px; }
              input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #222; background: #111; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
              input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
              #results { flex-grow: 1; overflow-y: auto; padding: 0 15px 15px; scrollbar-width: none; }
              #results::-webkit-scrollbar { display: none; }
              .item { padding: 12px; border-radius: 8px; background: var(--card); margin-bottom: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; animation: slideIn 0.3s ease-out forwards; }
              .item:hover { background: #1a1a1a; border-color: var(--primary); transform: translateX(4px); }
              .title { font-weight: 600; font-size: 13px; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
              .url { font-size: 11px; color: #64748b; word-break: break-all; margin-top: 4px; display: block; }
              @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <img src="icon.png" alt="Logo">
                <h1>History-On</h1>
              </div>
              <div class="search-wrap">
                <input type="text" id="search" placeholder="Search across time..." autofocus>
              </div>
              <div id="results"></div>
            </div>
            <script src="script.js"></script>
          </body>
          </html>
          EOF

          # Efficient Search Logic
          cat <<EOF > script.js
          const searchInput = document.getElementById('search');
          const resultsDiv = document.getElementById('results');

          const render = (query = '') => {
            chrome.history.search({ text: query, maxResults: 50, startTime: 0 }, (data) => {
              resultsDiv.innerHTML = data.map(page => \`
                <div class="item" onclick="window.open('\${page.url}', '_blank')">
                  <span class="title">\${page.title || 'Untitled'}</span>
                  <span class="url">\${page.url}</span>
                </div>
              \`).join('');
            });
          };

          searchInput.addEventListener('input', e => render(e.target.value));
          render();
          EOF

          # Fetch your Specific Logo
          curl -L -o icon.png "https://cdn-icons-png.flaticon.com/512/3913/3913442.png"

      - name: Package Master Extension
        run: |
          mkdir -p build_dir
          cp manifest.json index.html script.js icon.png build_dir/
          cd build_dir && zip -r ../History-On-v1.zip . && cd ..

      - name: Sync ZIP to Repo
        run: |
          git config --global user.name "johirxofficial"
          git config --global user.email "johirxofficial@gmail.com"
          git add History-On-v1.zip
          git commit -m "Shadow Update: History-On-v1.zip with official logo 🚀" || echo "No changes"
          git push
